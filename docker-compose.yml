name: fitcontrolgym-landing

services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./:/usr/share/nginx/html:ro
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=fitcontrolgym.iados.mx
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=fitcontrolgym.iados.mx
      - LETSENCRYPT_EMAIL=iados@outlook.es
    networks:
      - web_network

networks:
  web_network:
    external: true

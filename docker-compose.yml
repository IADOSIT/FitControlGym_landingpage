name: fitcontrolgym-landing

services:
  fitcontrolgym-landing:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=fitcontrolgym.iados.mx
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=fitcontrolgym.iados.mx
      - LETSENCRYPT_EMAIL=iados@outlook.es
    command: >
      sh -c "
        B=https://raw.githubusercontent.com/IADOSIT/FitControlGym_landingpage/main &&
        D=/usr/share/nginx/html &&
        wget -qO $$D/index.html $$B/index.html &&
        wget -qO $$D/logoiados.jpg $$B/logoiados.jpg;
        wget -qO $$D/screen-dashboard.jpg $$B/screen-dashboard.jpg;
        wget -qO $$D/screen-pos.jpg $$B/screen-pos.jpg;
        wget -qO $$D/screen-socios.jpg $$B/screen-socios.jpg;
        wget -qO $$D/screen-calendario.jpg $$B/screen-calendario.jpg;
        wget -qO $$D/screen-reportes.jpg $$B/screen-reportes.jpg;
        wget -qO $$D/screen-acceso.jpg $$B/screen-acceso.jpg;
        wget -qO $$D/screen-backups.jpg $$B/screen-backups.jpg;
        wget -qO $$D/screen-login.jpg $$B/screen-login.jpg;
        nginx -g 'daemon off;'
      "
    networks:
      - web_network

networks:
  web_network:
    external: true

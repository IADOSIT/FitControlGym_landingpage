services:
  fitcontrol-landing:
    image: nginx:alpine
    container_name: fitcontrol-landing
    restart: unless-stopped
    volumes:
      - ./:/usr/share/nginx/html:ro
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=fitcontrolgym.iados.mx
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=fitcontrolgym.iados.mx
      - LETSENCRYPT_EMAIL=iados@outlook.es
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true

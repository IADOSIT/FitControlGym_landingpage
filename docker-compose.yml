services:
  fitcontrol-landing:
    image: nginx:alpine
    container_name: fitcontrol-landing
    restart: unless-stopped
    volumes:
      - ./:/usr/share/nginx/html:ro
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fitcontrol-landing.rule=Host(`fitcontrol.iados.mx`)"
      - "traefik.http.routers.fitcontrol-landing.entrypoints=websecure"
      - "traefik.http.routers.fitcontrol-landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.fitcontrol-landing.loadbalancer.server.port=80"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
